const showToast = (text, type = 'info', duration = 2200) => {
    const el = $('toast');
    el.textContent = text;
    el.className = '';
    el.classList.add(type || 'info');
    if (toastTimer) clearTimeout(toastTimer);
    el.classList.add('show');
    toastTimer = setTimeout(() => el.classList.remove('show'), duration);
};

async function callYcFunction(action, params = {}, bodyData = null) {
    const url = new URL(YC_FUNCTION_URL);
    url.searchParams.set('action', action);
    url.searchParams.set('p', TG_ACTIVE ? 'tg' : (typeof vkBridge !== 'undefined' ? 'vk' : 'unknown'));
    VK_PARAMS.forEach((v, k) => url.searchParams.set(k, v));
    if (TG_ACTIVE) {
        url.searchParams.set('tg_init_data', Telegram.WebApp.initData);
    }
    url.searchParams.set('id', window.USER_ID);
    Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, v));
    
    const options = {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' }
    };
    
    if (bodyData !== null) {
        options.body = JSON.stringify(bodyData);
    }
    
    const response = await fetch(url.toString(), options);
    
    if (!response.ok) {
        throw new Error(`HTTP ${response.status}`);
    }
    
    return await response.json();
}

function encodeUserInfo() {
    try {

function getNavIconSvg(col, txt, az, isEnd = false, isCurr = false, hasComm = false) {
    const s = isEnd ? 34 : 40, c = s / 2;
    const r = isEnd ? 7 : 9;
    const txtStroke = hasComm ? '#FF3B30' : '#000000';

    const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${s}" height="${s}">
        <rect width="${s}" height="${s}" fill="transparent"/>
        ${isCurr ? `<circle cx="${c}" cy="${c}" r="${r + 3}" fill="none" stroke="#00FF00" stroke-width="2.5" opacity="0.9"/>` : ''}

        <circle cx="${c}" cy="${c}" r="${r}" fill="rgba(0,0,0,0.7)"/>
        <circle cx="${c}" cy="${c}" r="${r}" fill="${col}" opacity="0.3"/>
        <circle cx="${c}" cy="${c}" r="${r}" fill="none" stroke="${col}" stroke-width="1.5"/>
        <circle cx="${c}" cy="${c}" r="${r}" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="0.5"/>

    </svg>`;
    
    return 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(svg)));
}

function getArrowEndSvg(col, az) {
    const s = 30, c = s / 2;
    const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${s}" height="${s}">
        <g transform="rotate(${az},${c},${c})">
            <polygon points="${c},3 ${c+6},${c+6} ${c},${c+1} ${c-6},${c+6}" fill="${col}" stroke="#000000" stroke-width="1" opacity="0.9"/>

    return 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(svg)));

const getUserLocSvg = () => 'data:image/svg+xml;utf8,' + encodeURIComponent(`<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" fill="#007AFF" stroke="white" stroke-width="3"/><circle cx="12" cy="12" r="11" fill="none" stroke="#007AFF" stroke-width="1" opacity="0.3"/></svg>`);
function calcAzimuth(p1, p2) {
    if (!p1 || !p2) return 0;
    const [la1, lo1] = p1.map(v => v * Math.PI / 180);
    const [la2, lo2] = p2.map(v => v * Math.PI / 180);
    const y = Math.sin(lo2 - lo1) * Math.cos(la2);
    const x = Math.cos(la1) * Math.sin(la2) - Math.sin(la1) * Math.cos(la2) * Math.cos(lo2 - lo1);
    return Math.round((Math.atan2(y, x) * 180 / Math.PI + 360) % 360);
}
const serializePoints = () => JSON.stringify(points.map(p => ({ id: p.id, color: p.color, pts: p.pts, cmd: p.cmd, comm: p.comm })));

function formatJsonWithPts(data) {

}

function getDistanceFromLatLonInM(lat1, lon1, lat2, lon2) {
    const R = 6371000;
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLon = (lon2 - lon1) * Math.PI / 180;
    const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
              Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
              Math.sin(dLon/2) * Math.sin(dLon/2);
    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    return R * c;
}

const generateSlug = (text) => {
    const ruToEn = {
        'а': 'a', 'б': 'b', 'в': 'v', 'г': 'g', 'д': 'd', 'е': 'e', 'ё': 'e', 'ж': 'zh', 'з': 'z', 'и': 'i',
        'й': 'y', 'к': 'k', 'л': 'l', 'м': 'm', 'н': 'n', 'о': 'o', 'п': 'p', 'р': 'r', 'с': 's', 'т': 't',
        'у': 'u', 'ф': 'f', 'х': 'h', 'ц': 'ts', 'ч': 'ch', 'ш': 'sh', 'щ': 'sch', 'ъ': '', 'ы': 'y', 'ь': '',
        'э': 'e', 'ю': 'yu', 'я': 'ya'
    };
    return text.toLowerCase()
        .split('')
        .map(char => ruToEn[char] || char)
        .join('')
        .replace(/[^a-z0-9]/g, '_')
        .replace(/_+/g, '_')
        .replace(/^_|_$/g, '') || 'route';
};

function addP(coords, data = null, silent = false) {
    const ptsData = data?.pts || [coords];
    const p = { 
        id: data?.id || (points.length + 1), 
        color: data?.color || 'Gold', 
        cmd: data?.cmd || '', 
        comm: data?.comm || '', 
        pts: ptsData, 
        pm: new ymaps.Placemark(coords, {}, { iconLayout: 'default#imageWithContent', iconImageSize: [40,40], iconImageOffset: [-20,-20], zIndex: 1000 }), 
        line: new ymaps.Polyline(ptsData, {}, { strokeWidth: 4, strokeOpacity: 1, zIndex: 852, interactive: false }), 
        lineOutline: new ymaps.Polyline(ptsData, {}, { strokeWidth: 6, strokeOpacity: 1, zIndex: 850, interactive: false }), 
        lineAccent: null, 
        endPlacemark: null 
    };
    p.line.options.set('strokeColor', COLORS[p.color].hex);
    p.lineOutline.options.set('strokeColor', '#000000');
    
    p.pm.geometry.events.add('change', () => { 
        const nc = p.pm.geometry.getCoordinates(), pts = p.line.geometry.getCoordinates(); 
        if(pts.length) { 
            pts[0] = nc; 
            p.line.geometry.setCoordinates(pts); 
            p.lineOutline.geometry.setCoordinates(pts);
            if(p.lineAccent) p.lineAccent.geometry.setCoordinates(pts);
        } 
    });
    p.line.geometry.events.add('change', () => {
        const coords = p.line.geometry.getCoordinates();
        p.pts = coords.map(pt => [f6(pt[0]), f6(pt[1])]);
        p.lineOutline.geometry.setCoordinates(coords);
        if(p.lineAccent) p.lineAccent.geometry.setCoordinates(coords);
        if(isDrawing && coords.length > 0) {
            const pmCoords = p.pm.geometry.getCoordinates();
            if(Math.abs(pmCoords[0] - coords[0][0]) > 0.000001 || Math.abs(pmCoords[1] - coords[0][1]) > 0.000001) {
                p.pm.geometry.setCoordinates(coords[0]);
            }
        }
        if(isDrawing && p.pts.length > 1) { $('addText').textContent = "Завершить рисование пути"; }
        updI(p);
    });
    p.pm.events.add('click', () => { setActivePoint(p, true); if(!isAdd && !isDrawing) openEditPointModal(p); });
    map.geoObjects.add(p.lineOutline);
    map.geoObjects.add(p.pm);
    map.geoObjects.add(p.line);
    points.push(p);
    updI(p);
    if (!silent) updateSaveState();
    return p;
}

const stopAdd = () => { isAdd = false; tempNewPointData = null; $('addText').textContent = "Добавить новую точку"; $('addMarkerBtn').classList.remove('active'); map.setCursor('grab'); points.forEach(p => { if (p.endPlacemark) p.endPlacemark.options.set('interactive', false); }); updateGpsBtnVisibility(); };
const updI = p => { 
    const isCurrent = p === activePoint;
    const hasComm = !!p.comm;
    const az = p.pts?.length >= 2 ? calcAzimuth(p.pts[0], p.pts[1]) : 0;
    p.pm.options.set('iconImageHref', getNavIconSvg(COLORS[p.color].hex, p.id, az, false, isCurrent, hasComm));
    
    if (p.pts?.length >= 2) {
        if (isCurrent) {
            if (!p.lineAccent) {
                p.lineAccent = new ymaps.Polyline(p.pts, {}, { strokeWidth: 6, strokeOpacity: 1, zIndex: 851, interactive: false });
                p.lineAccent.options.set('strokeColor', '#A4E84A');
                map.geoObjects.add(p.lineAccent);
            } else {
                p.lineAccent.geometry.setCoordinates(p.pts);
            }
        } else {
            if (p.lineAccent) {
                map.geoObjects.remove(p.lineAccent);
                p.lineAccent = null;
            }
        }
        
        if (!p.endPlacemark) {
            p.endPlacemark = new ymaps.Placemark([0, 0], {}, { iconLayout: 'default#image', iconImageSize: [30,30], iconImageOffset: [-15,-15], zIndex: 950 });
            p.endPlacemark.events.add('click', (e) => {
                if (isAdd && tempNewPointData) {
                    e.stopPropagation();
                    const coords = p.endPlacemark.geometry.getCoordinates();
                    const newPoint = addP(coords, { ...tempNewPointData });
                    pushHistorySnapshot();
                    updateSaveState();
                    setActivePoint(newPoint, false);
                    startDrawingForPoint(newPoint, true);
                    tempNewPointData = null;
                    points.forEach(pt => { if (pt.endPlacemark) pt.endPlacemark.options.set('interactive', false); });
                } else {
                    e.stopPropagation();
                }
            });
            p.endPlacemark.options.set('interactive', false);
            map.geoObjects.add(p.endPlacemark);
        }
        const last = p.pts[p.pts.length - 1];
        const prev = p.pts.length >= 2 ? p.pts[p.pts.length - 2] : last;
        p.endPlacemark.geometry.setCoordinates(last);
        p.endPlacemark.options.set('iconImageHref', getArrowEndSvg(COLORS[p.color].hex, calcAzimuth(prev, last)));
    } else {
        if (p.lineAccent) {
            map.geoObjects.remove(p.lineAccent);
            p.lineAccent = null;
        }
        if (p.endPlacemark) {
            map.geoObjects.remove(p.endPlacemark);
            p.endPlacemark = null;
        }
    }
};

function createPointCard(p, single = false) {
    const item = document.createElement('div'); item.className = 'sortable-point-item'; item.dataset.id = p.id;
    item.innerHTML = `${!single ? '<div class="sort-handle">☰</div>' : ''}<div class="item-main-row"><div class="point-number-text">${p.id || '?'}</div><div class="color-indicator-btn" style="background:${COLORS[p.color].hex}"></div><select class="cmd-select"></select></div><textarea class="comm-input" placeholder="комментарий">${p.comm || ''}</textarea><div class="item-actions"><button class="btn-item-action btn-path">🖋️ Изменить путь</button><button class="btn-item-action btn-del" style="color:var(--danger)">🗑️ Удалить</button></div>`;

const sel = item.querySelector('.cmd-select');
    updateCommandOptions(sel, p.color, p.cmd);
    const comm = item.querySelector('.comm-input');
    const autoHeight = () => { comm.style.height = 'auto'; comm.style.height = comm.scrollHeight + 'px'; };
    comm.addEventListener('input', () => { p.comm = comm.value; autoHeight(); updateSaveState(); });
    comm.addEventListener('blur', () => { pushHistorySnapshot(); updateSaveState(); });
    setTimeout(autoHeight, 0);
    item.querySelector('.color-indicator-btn').onclick = e => { e.stopPropagation(); activeListPoint = { point: p, card: item }; toggleD('listColorDropdown'); };
    sel.onchange = () => { p.cmd = sel.value; pushHistorySnapshot(); updateSaveState(); };
    item.onclick = e => {
        if (e.target.closest('.btn-item-action') || e.target.closest('.color-indicator-btn') || e.target.closest('.cmd-select') || e.target.closest('.comm-input')) return;
        setActivePoint(p, true);
    };
    item.querySelector('.btn-del').onclick = () => { confirmDeletePoint(p, single); };
    item.querySelector('.btn-path').onclick = () => { toggleM('pointsOrderModal'); startEditPath(p); };
    return item;
}
async function delPoint(p) {
    points = points.filter(x => x !== p);
    map.geoObjects.remove(p.pm);
    map.geoObjects.remove(p.line);
    map.geoObjects.remove(p.lineOutline);
    if(p.lineAccent) map.geoObjects.remove(p.lineAccent);
    if(p.endPlacemark) map.geoObjects.remove(p.endPlacemark);
    if (activePoint === p) activePoint = null;
    recalculateIds();
    setActivePoint(points[0] || null);
    await saveGist();
    showToast("Изменения сохранены", "success");
}
function startEditPath(p) {
    cur = p;
    isDrawing = true;
    $('addText').textContent = "Завершить рисование пути";
    $('addMarkerBtn').classList.add('drawing');
    p.pm.options.set('draggable', true);
    p.line.editor.startEditing();
    setActivePoint(p, true);
    updateGpsBtnVisibility();
}

function openPointsOrderModal() {
    modalMode = 'list'; const list = $('pointsSortList'); list.innerHTML = ''; $('orderModalTitle').textContent = curRoute || "Маршрут"; $('saveInListBtn').style.display = 'block'; $('saveBtnText').textContent = "Готово";
    if (!points.length) list.innerHTML = '<div style="text-align:center;padding:40px;color:#c7c9d1;font-weight:500;">Маршрут пока пуст</div>'; else points.forEach(p => list.appendChild(createPointCard(p)));
    syncActiveListCard();
    toggleM('pointsOrderModal');
}

function openEditPointModal(p) { modalMode = 'edit'; $('pointsSortList').innerHTML = ''; $('orderModalTitle').textContent = `Точка #${p.id}`; $('saveInListBtn').style.display = 'block'; $('saveBtnText').textContent = "Готово"; $('pointsSortList').appendChild(createPointCard(p, true)); syncActiveListCard(); toggleM('pointsOrderModal'); }
function openCreatePointModal() {
    modalMode = 'create';
    $('pointsSortList').innerHTML = '';
    $('orderModalTitle').textContent = "Новая точка";
    $('saveInListBtn').style.display = 'block';
    $('saveBtnText').textContent = "Поставить на карту";
    tempNewPointData = { id: points.length + 1, color: 'Gold', cmd: COMMAND_SETS.Gold[0], comm: '' };
    $('pointsSortList').appendChild(createPointCard(tempNewPointData, true));
    toggleM('pointsOrderModal');
}

async function handleModalSave() {
    if (modalMode === 'list' || modalMode === 'edit') {
        await saveGist();
    }
    toggleM('pointsOrderModal');
    if (modalMode === 'list' || modalMode === 'edit') {
        showToast("Изменения сохранены", "success");
    }
    else if (modalMode === 'create') {
        isAdd = true;
        points.forEach(p => { if (p.endPlacemark) p.endPlacemark.options.set('interactive', true); });
        $('addMarkerBtn').classList.add('active');
        $('addText').textContent = "Выберите место на карте";
        updateGpsBtnVisibility();
    }
}

function reorderPointsFromList() {
    pushHistorySnapshot();
    points = Array.from($('pointsSortList').children).map(c => points.find(p => p.id === parseInt(c.dataset.id))).filter(p => !!p);
    recalculateIds();
    pushHistorySnapshot();
    updateSaveState();
}
async function saveGist() {
    if(!curRoute) return;
    const btn = $('saveInListBtn');
    const topSaveBtn = $('saveStateBtn');
    btn.classList.add('loading');
    if (topSaveBtn) { topSaveBtn.disabled = true; topSaveBtn.textContent = 'Сохраняем...'; }
    try {
        const data = points.map(p => ({ id: p.id, color: p.color, pts: p.pts, cmd: p.cmd, comm: p.comm }));
        const result = await callYcFunction('save', { m: curRoute }, { data, category: currentRouteMeta.category || '' });
        if(result && !result.error) {
            lastSavedSnapshot = serializePoints();
            btn.classList.remove('loading');
            btn.classList.add('saved');
            if (topSaveBtn) topSaveBtn.textContent = 'Сохранено';
            setTimeout(() => {
                btn.classList.remove('saved');
                updateSaveState();
            }, 900);
        } else {
            btn.classList.remove('loading');
            if (topSaveBtn) { topSaveBtn.disabled = false; topSaveBtn.textContent = 'Ошибка, повторить'; }
            showToast(result?.error || 'Ошибка сохранения', 'error');
        }
    } catch(e) {
        btn.classList.remove('loading');
        if (topSaveBtn) { topSaveBtn.disabled = false; topSaveBtn.textContent = 'Ошибка, повторить'; }
        showToast('Ошибка: ' + e.message, 'error');
    }
}

// Экспорт функций в глобальную область для onclick обработчиков
